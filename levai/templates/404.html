{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Não Encontrada - LevAI</title>
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'css/error.css' %}">
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Oops! Página não encontrada</h2>
            <p class="error-message">
                A página que você está procurando não existe ou foi movida.
            </p>
            <div class="error-actions">
                <a href="{% url 'home' %}" class="btn-primary">Voltar ao Início</a>
                <a href="{% url 'chat_view' %}" class="btn-secondary">Ir para o Chat</a>
            </div>
            <div class="error-illustration">
                <svg width="200" height="200" viewBox="0 0 200 200">
                    <circle cx="100" cy="100" r="80" fill="var(--bg-secondary)" stroke="var(--border-light)" stroke-width="2"/>
                    <text x="100" y="110" text-anchor="middle" fill="var(--text-muted)" font-size="24">404</text>
                </svg>
            </div>
        </div>
    </div>
</body>
</html>
