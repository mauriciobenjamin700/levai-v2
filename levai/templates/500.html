{% extends "base.html" %}

{% block title %}Erro Interno - LevAI{% endblock %}

{% block body %}
<div class="error-container">
    <div class="error-code">500</div>
    <h2 class="error-title">Erro interno do servidor</h2>
    <p class="error-message">
        Algo deu errado em nossos servidores. Tente novamente em alguns minutos.
    </p>
    <div class="error-actions">
        <a href="/" class="btn btn-primary">Voltar ao Inicio</a>
        <button onclick="window.location.reload()" class="btn btn-secondary">Tentar Novamente</button>
    </div>
</div>
{% endblock %}
