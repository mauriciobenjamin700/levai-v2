<header id="header" class="headerContainer">
    <button id="menuToggle" class="menu-toggle" aria-label="Abrir menu de navegacao">
        <span class="menu-icon"></span>
    </button>
    <h1><a href="/">
        <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M48 8c-2 0-4 1-5 3l-3 5c-1-1-3-2-5-2h-4c-6 0-11 4-13 9l-2 5c-1 3-4 5-7 5h-1v4h2c3 0 6-1 8-4l1 6c1 5 5 9 10 9h2l4-1 3 6h6l-4-8c3-3 5-7 5-12v-5l4-4v-8l-4 2c-1-3-2-6-4-8l3-2z" fill="var(--accent)"/>
            <circle cx="38" cy="18" r="2" fill="var(--accent-text)"/>
            <path d="M44 24c-1 1-3 1-4 0" stroke="var(--accent-text)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M20 38l-4 4-4-2" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M50 12l4-2v8l-4 4" stroke="var(--accent)" stroke-width="1" opacity="0.5"/>
        </svg>
        LevAI
    </a></h1>
    <p class="header-tagline">Um assistente de IA para o seu dia a dia.</p>
    <button id="themeToggle" class="theme-toggle" aria-label="Alternar tema">
        <svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>
    <div class="headerProfile">
        <p>{{ request.user.username }}</p>
        <form action="{% url 'logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit">Sair</button>
        </form>
    </div>
</header>
