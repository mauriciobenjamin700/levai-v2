networks:
  levai_network:
    driver: bridge

volumes:
  levai-data:
    driver: local
  levai-static:
    driver: local
  levai-media:
    driver: local


services:
  levai-database:
    container_name: levai-database
    build:
      context: ./database
      dockerfile: Dockerfile
      args:
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_NAME: ${DB_NAME}
    networks:
      - levai_network
    ports:
      - "5432:5432"
    volumes:
      - levai-data:/var/lib/postgresql/data
      - ./database/backups:/backups
    restart: always
    env_file:
      - .env

  levai-app:
    container_name: levai-app
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - levai_network
    volumes:
      - levai-static:/app/staticfiles
      - levai-media:/app/levai/media
    expose:
      - "8000"
    depends_on:
      - levai-database
    restart: always
    env_file:
      - .env

  levai-nginx:
    container_name: levai-nginx
    build:
      context: ./nginx
      dockerfile: Dockerfile
    networks:
      - levai_network
    ports:
      - "8040:80"
    volumes:
      - levai-static:/app/staticfiles:ro
      - levai-media:/app/levai/media:ro
    depends_on:
      - levai-app
    restart: always
